{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="weather-card auth-card">
        <h2>Create Account</h2>
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="eg.,Joe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="eg.,xyz.@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-auth">Register</button>
        </form>
        <p class="auth-switch">Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
